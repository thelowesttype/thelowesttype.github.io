# The URL the site will be built for
base_url = "https://thelowesttype.github.io"
title = "The Lowest Type"
description = "The Very Best of the Humans"

# The site theme to use.
theme = "adidoks"

# The default language; used in feeds and search index
# Note: the search index doesn't support Chinese/Japanese/Korean Languages
default_language = "en"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to generate a feed file for the site
generate_feeds = true
feed_filenames = ["rss.xml"]

# When set to "true", the generated HTML files are minified.
minify_html = false

# The taxonomies to be rendered for the site and their configuration.
taxonomies = [
  {name = "authors"},
  {name="tags", feed = true},
]

# Whether to build a search index to be used later on by a JavaScript library
# When set to "true", a search index is built from the pages and section
# content for `default_language`.
build_search_index = true

[search]
# Whether to include the title of the page/section in the index
include_title = true
# Whether to include the description of the page/section in the index
include_description = false
# Whether to include the rendered content of the page/section in the index
include_content = true

[markdown]
# Zola 0.16+ syntax for syntax highlighting
[markdown.highlighting]
highlight_code = true
theme = "dracula"

[extra]
# Put all your custom variables here
author = "Saksham Sharma"
github = "https://github.com/codeck313"
twitter = "https://twitter.com/codeck313"
youtube = "https://www.youtube.com/channel/UC7BLVR5OvHzaD7utOEuk94g"
email = "saksham.prob@gmail.com"

# If running on netlify.app site, set to true
is_netlify = false

# Set HTML file language
language_code = "en-US"

# Set theme-color meta tag for Chrome browser

# More about site's title
title_separator = "|"  # set as |, -, _, etc
title_addition = "Easily formed"


# Set date format in blog publish metadata
timeformat = "%d %m %Y" # e.g. June 14, 2021
timezone = "America/New_York"

# Edit page on reposity or not
edit_page = false
docs_repo = "https://github.com/codeck313/"
repo_branch = "main"

## Math settings
# options: true, false. Enable math support globally,
# default: false. You can always enable math on a per page.
math = false
library = "katex"  # options: "katex", "mathjax". default is "katex".

## Open Graph + Twitter Cards
[extra.open]
enable = true
# this image will be used as fallback if a page has no image of its own
# TODO
image = "https://i.ibb.co/k6vQ0dg/logo.png"
twitter_site = "codeck313"
twitter_creator = "codeck313"
og_locale = "en_US"

## JSON-LD
[extra.schema]
type = "Organization"
logo = "logo-doks.png"
twitter = "https://twitter.com/codeck313"
linked_in = ""
github = "https://github.com/codeck313"
section = "blog" # see config.extra.main~url
## Sitelinks Search Box
site_links_search_box = false


